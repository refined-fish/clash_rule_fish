## 路由规则设置---------------------------------------------------------------------------------------------------
rules:
  #### 对于必须直连者直接使用direct写死，其他尽可能使用代理组以方便面板控制以及切换测试
  # 禁用所有代理的QUIC，防止速度不佳和IP泄露，不包括国内网站
  - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOSITE,cn))),REJECT # 禁用域名的QUIC，防止速度不佳和IP泄露
  - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOIP,cn))),REJECT # 禁用IP的QUIC，防止速度不佳和IP泄露

  # FISH自定义规则块
  - RULE-SET,♻️延迟最低-FISH,✅默认代理 # FISH自定义代理
  - RULE-SET,🌐Direct-FISH,🌐默认直连 # FISH自定义直连

  #### 代理规则块，按照使用频率/包含关系排序
  # 微软相关
  - RULE-SET,Ⓜ️微软Copilot-FISH,Ⓜ️微软Copilot # 微软copilot服务
  # AI相关
  - GEOSITE,category-ai-!cn,🤖国外AI # 国外AI服务
  # 游戏相关
  - GEOSITE,category-game-platforms-download,🌐默认直连 # 各类游戏平台下载域名，包括steam下载
  # 编程相关
  - GEOSITE,category-container,✅默认代理 # 各种容器服务
  - GEOSITE,python,✅默认代理 # Python服务，例如pip直连下载较慢
  # telegram相关
  - GEOSITE,telegram,✈️Telegram # Telegram服务
  - GEOIP,telegram,✈️Telegram,no-resolve # Telegram服务IP
  # 影视相关
  - GEOSITE,tmdb,✅默认代理 # TMDB服务，影视刮削，直连访问缓慢经常失败
  - GEOSITE,bahamut,📺巴哈姆特 # 巴哈姆特服务
  - GEOSITE,category-porn,✅默认代理 # X网站
  # 其他
  - GEOSITE,tailscale,DIRECT # 必须直连，否则tailscale无法成功直连打洞
  - GEOSITE,category-public-tracker,DIRECT # 必须直连，否则BT会向Tracker上报代理IP，代理下载上传
  - GEOSITE,category-cas,DIRECT # 证书颁发机构，直连以防止证书错误
  - GEOSITE,win-update,DIRECT # Windows操作系统升级，直连以节省流量
  - RULE-SET,🔐PT-Web-FISH,🔐PT网站 # PT网页多用cloudFlare，污染严重故代理，需注意有的PT站网页域名也是tracker！
  - GEOSITE,category-pt,DIRECT # PT tracker，必须直连，否则会代理上传下载
  - RULE-SET,🔐PT-Tracker,DIRECT # PT tracker，必须直连，否则会代理上传下载

  #### 兜底规则块，一般精细的分流规则应在其上
  - GEOSITE,gfw,🧱GFW # GFW兜底
  - GEOSITE,microsoft,Ⓜ️微软服务 # 微软服务，放于GFW后是因为github等在GFW中需要代理
  - GEOSITE,steam,🎮Steam # Steam，默认直连，换区时修改此处，放于GFW之后是因创意工坊需始终代理
  # 私有地址绕过块
  - GEOIP,private,DIRECT,no-resolve # 私有地址直连
  - GEOSITE,private,DIRECT # 私有地址直连
  - GEOSITE,cn,🌐默认直连 # 地理位置在中国的域名，不包括谷歌在中国的域名避免谷歌商店下载问题
  - GEOIP,cn,🌐默认直连,no-resolve # 中国IP
  - MATCH,🐟漏网之鱼 # 漏网之鱼
