  #################### 💻CodeSource，程序源码规则集，一般用于编译或下载程序资源/更新等
  - GEOSITE,category-container # 各种容器服务
  - GEOSITE,docker # docker容器服务
  - GEOSITE,python # python服务，例如pip直连下载较慢
  - DOMAIN,artifacts.bitwarden.com # bitwarden安装程序资源下载网址，不代理的话bitwarden安装过程要10+分钟
  - DOMAIN,www.python.org # Python源码相关分发
  - DOMAIN,cdn.kernel.org # Linux内核下载地址
  - DOMAIN,cache.ruby-lang.org # ruby代码分发
  - DOMAIN,git.codelinaro.org # codelinaro代码分发
  - DOMAIN,mirror.csclub.uwaterloo.ca # 滑铁卢大学代码分发镜像加速
  - DOMAIN,mirror.netcologne.de # 德国科隆电信公司分发服务器
  - DOMAIN,www.busybox.net # busybox源码
  - DOMAIN,repo.jellyfin.org # Jellyfin仓库，亚太地区的CDN，用于下载更新/插件等等
  - DOMAIN,sgp1.mirror.jellyfin.org # Jellyfin仓库，亚太地区的CDN，用于下载更新/插件等等
  - DOMAIN,deb.debian.org # debian仓库
  - DOMAIN,launchpad.proxy.ustclug.org # launchpad仓库，提供Ubuntu和Debian的软件包和源代码
  - DOMAIN,ftp.gwdg.de # 
